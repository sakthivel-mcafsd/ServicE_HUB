<div class="container mt-4">

  <h3 class="page-title">Available Bookings</h3>

  <div class="row">
    <div class="col-md-6 col-lg-4" *ngFor="let booking of bookings">

      <div class="booking-card">

        <!-- Header -->
        <div class="card-top">
          <h5>{{ booking.service }}</h5>

          <span class="status"
                [ngClass]="{
                  'accepted': booking.status === 'Accepted',
                  'completed': booking.status === 'Completed',
                  'pending': booking.status === 'Pending'
                }">
            {{ booking.status }}
          </span>
        </div>

        <!-- Details -->
        <p class="customer"><b>👤</b> {{ booking.customer }}</p>
        <p class="desc">🛠 {{ booking.description }}</p>

        <!-- Footer -->
        <div class="card-bottom">
          <small>📅 {{ booking.date }} | ⏰ {{ booking.time }}</small>

          <button class="btn-action"
                  [disabled]="booking.status === 'Completed'"
                  (click)="AcceptBooking(booking.id)">
            ✔ Accepted
          </button>
        </div>

      </div>

    </div>
  </div>

</div>
