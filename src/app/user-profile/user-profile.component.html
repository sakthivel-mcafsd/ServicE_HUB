<div class="container mt-4" *ngIf="user">
  <div class="row">
    <div class="col-md-4">
      <div class="card text-center shadow-sm p-3">
        <div class="card-body">
          <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 100px; height: 100px; font-size: 2rem;">
            {{ user.fullName.charAt(0) }}
          </div>
          <h4 class="card-title">{{ user.fullName }}</h4>
          <span class="badge bg-light text-primary mb-3">{{ user.role }}</span>
          
          <div class="text-start text-muted mt-4">
            <p><i class="bi bi-envelope"></i> {{ user.email }}</p>
            <p><i class="bi bi-telephone"></i> {{ user.mobileNumber }}</p>
            <p><i class="bi bi-geo-alt"></i> {{ user.location }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>User Profile</h3>
        <button class="btn btn-primary" *ngIf="!isEditing" (click)="toggleEdit()">
          <i class="bi bi-pencil"></i> Edit Profile
        </button>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title text-primary mb-4">Personal Information</h5>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" [readonly]="!isEditing" [class.bg-light]="!isEditing" [(ngModel)]="user.fullName">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email Address <span class="text-danger">*</span></label>
              <input type="email" class="form-control" [readonly]="!isEditing" [class.bg-light]="!isEditing" [(ngModel)]="user.email">
            </div>
            <div class="col-md-6">
              <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
              <input type="text" class="form-control" [readonly]="!isEditing" [class.bg-light]="!isEditing" [(ngModel)]="user.mobileNumber">
            </div>
            <div class="col-md-6">
              <label class="form-label">Date of Birth <span class="text-danger">*</span></label>
              <input type="date" class="form-control" [readonly]="!isEditing" [class.bg-light]="!isEditing" [(ngModel)]="user.dateOfBirth">
            </div>
            <div class="col-md-6">
              <label class="form-label">Gender</label>
              <select class="form-select" [disabled]="!isEditing" [class.bg-light]="!isEditing" [(ngModel)]="user.gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Role / Designation</label>
              <input type="text" class="form-control bg-light" readonly [(ngModel)]="user.role">
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title text-primary mb-4">Address Information</h5>
          <div class="mb-3">
            <label class="form-label">Full Address <span class="text-danger">*</span></label>
            <textarea class="form-control" rows="3" [readonly]="!isEditing" [class.bg-light]="!isEditing" [(ngModel)]="user.address"></textarea>
          </div>
        </div>
      </div>

      <div class="text-end" *ngIf="isEditing">
        <button class="btn btn-light me-2 border" (click)="cancelEdit()">Cancel</button>
        <button class="btn btn-primary" (click)="saveProfile()">Save Changes</button>
      </div>

    </div>
  </div>
</div>
